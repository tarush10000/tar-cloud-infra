name: Deploy Tar Cloud

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Infrastructure
        run: |
          rsync -a --delete ./ /srv/tar-cloud-infra/

          cd /srv/tar-cloud-infra

          chmod +x scripts/deploy.sh

          ./scripts/deploy.sh
