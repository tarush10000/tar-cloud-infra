services:
  grafana:
    image: grafana/grafana-oss:latest

    container_name: grafana

    restart: unless-stopped

    environment:
      GF_SERVER_DOMAIN: grafana.tarush.in
      GF_SERVER_ROOT_URL: https://grafana.tarush.in
      GF_SERVER_SERVE_FROM_SUB_PATH: false

    volumes:
      - /srv/data/grafana:/var/lib/grafana

    networks:
      - tar-cloud

networks:
  tar-cloud:
    external: true
