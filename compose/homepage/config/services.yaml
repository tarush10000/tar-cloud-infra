---
- Infrastructure:
    - Homepage:
        icon: homepage.png
        href: https://home.tarush.in
        description: Infrastructure Dashboard
        widget:
            type: uptimekuma
            url: http://uptime-kuma:3001
            slug: homepage-test

    - Portainer:
        icon: portainer.png
        href: https://portainer.tarush.in
        description: Docker Management
        widget:
            type: portainer
            url: http://portainer:9000
            env: 1
            key: "{{HOMEPAGE_VAR_PORTAINER_TOKEN}}"

    - Nginx:
        icon: nginx.png
        description: Reverse Proxy
        widget:
            type: uptimekuma
            url: http://uptime-kuma:3001
            slug: nginx

    - Uptime Kuma:
        icon: uptime-kuma.png
        href: https://kuma.tarush.in
        description: Service Monitoring

- Platform:
    - PostgreSQL:
        icon: postgres.png
        description: Primary Database
        widget:
            type: uptimekuma
            url: http://uptime-kuma:3001
            slug: postgres

    - Redis:
        icon: redis.png
        description: Cache Server
        widget:
            type: uptimekuma
            url: http://uptime-kuma:3001
            slug: redis

    - MinIO:
        icon: minio.png
        href: https://minio.tarush.in
        description: Object Storage
        widget:
            type: uptimekuma
            url: http://uptime-kuma:3001
            slug: minio

    - MinIO API:
        icon: minio.png
        description: S3 API
        widget:
            type: uptimekuma
            url: http://uptime-kuma:3001
            slug: minio-api

- Monitoring:
    - Grafana:
        icon: grafana.png
        href: https://grafana.tarush.in
        description: Metrics Dashboard
        widget:
            type: grafana
            url: http://grafana:3000
            username: "{{HOMEPAGE_VAR_GRAFANA_USERNAME}}"
            password: "{{HOMEPAGE_VAR_GRAFANA_PASSWORD}}"

    - Grafana Status:
        icon: grafana.png
        description: Availability
        widget:
            type: uptimekuma
            url: http://uptime-kuma:3001
            slug: grafana

    - Prometheus:
        icon: prometheus.png
        href: https://prometheus.tarush.in
        description: Metrics Collection
        widget:
            type: uptimekuma
            url: http://uptime-kuma:3001
            slug: prometheus

