services:
  node-exporter:
    image: prom/node-exporter:latest

    container_name: node-exporter

    restart: unless-stopped

    ports:
      - "9100:9100"

    command:
      - '--path.rootfs=/host'

    volumes:
      - '/:/host:ro,rslave'

    networks:
      - tar-cloud

networks:
  tar-cloud:
    external: true
