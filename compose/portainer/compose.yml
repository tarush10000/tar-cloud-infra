services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus

    restart: unless-stopped

    ports:
      - "9090:9090"

    volumes:
      - /srv/data/prometheus:/prometheus
      - /srv/tar-cloud-infra/compose/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

    networks:
      - tar-cloud

networks:
  tar-cloud:
    external: true