services:
  postgres:
    image: postgres:17

    container_name: postgres

    restart: unless-stopped

    ports:
      - "5432:5432"

    environment:
      POSTGRES_USER: tar
      POSTGRES_PASSWORD: change_this_password
      POSTGRES_DB: tarcloud

    volumes:
      - /srv/data/postgres:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tar"]
      interval: 30s
      timeout: 5s
      retries: 5
