services:
  prometheus:
    image: prom/prometheus:latest

    container_name: prometheus

    restart: unless-stopped

    command:
      - --web.external-url=/prometheus
      - --web.route-prefix=/

    volumes:
      - /srv/data/prometheus:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

    networks:
      - tar-cloud

networks:
  tar-cloud:
    external: true
