services:
  prometheus:
    image: prom/prometheus:latest

    container_name: prometheus

    restart: unless-stopped

    ports:
      - "9090:9090"

    volumes:
      - /srv/data/prometheus:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

    networks:
      - tar-cloud

networks:
  tar-cloud:
    external: true
