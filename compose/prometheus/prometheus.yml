global:
  scrape_interval: 15s

scrape_configs:

  - job_name: prometheus
    static_configs:
      - targets:
          - 192.168.1.9:9090

  - job_name: node-exporter
    static_configs:
      - targets:
          - 192.168.1.9:9100

  - job_name: cadvisor
    static_configs:
      - targets:
          - 192.168.1.9:8080
